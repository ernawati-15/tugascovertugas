<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google </title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    flex-direction:column;
    background:white;
}

/* Navbar */
header{
    display:flex;
    justify-content:flex-end;
    padding:15px 25px;
}

nav ul{
    display:flex;
    list-style:none;
    gap:20px;
    align-items:center;
}

nav li{
    cursor:pointer;
    font-size:14px;
}

nav li:hover{
    text-decoration:underline;
}

.profile{
    width:35px;
    height:35px;
    border-radius:50%;
    background:#152238;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:bold;
}

/* Main */
main{
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    margin-top:-80px;
}

.logo{
    font-size:80px;
    font-weight:bold;
    margin-bottom:30px;
}

.logo span:nth-child(1){color:#4285f4;}
.logo span:nth-child(2){color:#ea4335;}
.logo span:nth-child(3){color:#fbbc05;}
.logo span:nth-child(4){color:#4285f4;}
.logo span:nth-child(5){color:#467953;}
.logo span:nth-child(6){color:#ca6363;}

.search-box{
    width:600px;
    max-width:90%;
    padding:15px 20px;
    border-radius:30px;
    border:1px solid #dcdcdc;
    outline:none;
    font-size:16px;
}

.search-box:hover{
    box-shadow:0 0 10px rgba(0,0,0,0.15);
}

/* Shortcut */
.shortcuts{
    margin-top:35px;
    display:flex;
    gap:35px;
    flex-wrap:wrap;
    justify-content:center;
}

.shortcut{
    width:90px;
    display:flex;
    flex-direction:column;
    align-items:center;
    cursor:pointer;
}

.icon{
    width:60px;
    height:60px;
    border-radius:50%;
    background:#e8eaed;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:25px;
}

.icon:hover{
    background:#d2d5d7;
}

.shortcut span{
    margin-top:10px;
    font-size:13px;
    text-align:center;
}

/* Footer */
footer{
    background:#f1f3f4;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
}

footer ul{
    display:flex;
    list-style:none;
    gap:20px;
}
</style>
</head>

<body>

<header>
    <nav>
        <ul>
            <li>Gmail</li>
            <li>Images</li>
            <li>☰</li>
            <li class="profile">E</li>
        </ul>
    </nav>
</header>

<main>

    <h1 class="logo">
        <span>G</span>
        <span>o</span>
        <span>o</span>
        <span>g</span>
        <span>l</span>
        <span>e</span>
    </h1>

    <input
        type="text"
        class="search-box"
        placeholder="nyari apa aja disini......"
    >

    <div class="shortcuts">

        <div class="shortcut">
            <div class="icon">🎓</div>
            <span>E-Learning</span>
        </div>

        <div class="shortcut">
            <div class="icon">🤖</div>
            <span>ChatGPT</span>
        </div>

        <div class="shortcut">
            <div class="icon">📄</div>
            <span>Google Docs</span>
        </div>

        <div class="shortcut">
            <div class="icon">📧</div>
            <span>Gmail</span>
        </div>

        <div class="shortcut">
            <div class="icon">+</div>
            <span>Add Shortcut</span>
        </div>

    </div>

</main>

<footer>

    <ul>
        <li>tentang</li>
        <li>Bisnis</li>
    </ul>

    <ul>
        <li>privasi</li>
        <li>pengaturan</li>
    </ul>

</footer>

</body>
</html>
